name: Arch Linux

on:
  workflow_dispatch:
  push:
    paths:
      - '**'
  pull_request:
    paths:
      - '**'

permissions:
  contents: read

concurrency:
  group: archlinux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (Arch Linux, GCC, CMake+Ninja)
    runs-on: ubuntu-latest
    timeout-minutes: 180

    container:
      image: archlinux:latest

    env:
      CMAKE_BUILD_TYPE: Release
      SPECTRA_BUILD_DIR: build
      SPECTRA_MIN_CMAKE_VERSION: '4.3'
      SPECTRA_CUDA_MAJOR_VERSION: '13'
      SPECTRA_OPTIX_TAG: v9.1.0
      SPECTRA_SLANG_URL: https://github.com/shader-slang/slang/releases/download/v2026.11/slang-2026.11-linux-x86_64.tar.gz
      CUDAToolkit_ROOT: /opt/cuda

    steps:
      - name: Prepare Arch keyring + update system
        shell: bash
        run: |
          set -euxo pipefail
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm

      - name: Install build dependencies
        shell: bash
        run: |
          set -euxo pipefail
          pacman -S --noconfirm --needed \
            base-devel git \
            cmake ninja pkgconf \
            gcc \
            ca-certificates curl tar unzip \
            python \
            vulkan-headers vulkan-icd-loader vulkan-tools vulkan-validation-layers \
            shaderc glslang \
            wayland wayland-protocols libxkbcommon \
            libx11 libxrandr libxinerama libxcursor libxi \
            mesa \
            cuda
          pacman -Scc --noconfirm || true

          echo "/opt/cuda/bin" >> "${GITHUB_PATH}"
          echo "CUDAToolkit_ROOT=/opt/cuda" >> "${GITHUB_ENV}"

      - name: Install Slang
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p /opt/slang
          curl -L --fail --retry 5 --retry-delay 2 "${SPECTRA_SLANG_URL}" -o /tmp/slang.tar.gz
          tar -xzf /tmp/slang.tar.gz -C /opt/slang
          rm -f /tmp/slang.tar.gz

          test -x /opt/slang/bin/slangc
          /opt/slang/bin/slangc -version

          echo "/opt/slang/bin" >> "${GITHUB_PATH}"
          echo "SLANG_DIR=/opt/slang" >> "${GITHUB_ENV}"

      - name: Install OptiX SDK
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth 1 --branch "${SPECTRA_OPTIX_TAG}" https://github.com/NVIDIA/optix-sdk.git /opt/optix-sdk
          test -f /opt/optix-sdk/include/optix.h
          echo "SPECTRA_OPTIX_PATH=/opt/optix-sdk" >> "${GITHUB_ENV}"

      - name: Toolchain sanity
        shell: bash
        run: |
          set -euxo pipefail

          g++ --version
          cmake --version
          ninja --version
          command -v nvcc
          nvcc --version
          command -v glslc && glslc --version
          command -v glslangValidator && glslangValidator --version
          command -v slangc && slangc -version
          test -f "${SPECTRA_OPTIX_PATH}/include/optix.h"

          cmake_version="$(cmake --version | sed -n '1s/^cmake version //p')"
          cmake_major="${cmake_version%%.*}"
          cmake_rest="${cmake_version#*.}"
          cmake_minor="${cmake_rest%%.*}"
          if (( cmake_major < 4 || (cmake_major == 4 && cmake_minor < 3) )); then
            echo "::error::CMake ${SPECTRA_MIN_CMAKE_VERSION} or newer is required; found ${cmake_version}."
            exit 1
          fi

          nvcc --version | grep -Eq "release ${SPECTRA_CUDA_MAJOR_VERSION}\\."

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Configure
        shell: bash
        run: |
          set -euxo pipefail
          cmake -S . -B "${SPECTRA_BUILD_DIR}" -G Ninja \
            -DCMAKE_BUILD_TYPE="${CMAKE_BUILD_TYPE}" \
            -DSPECTRA_OPTIX_PATH="${SPECTRA_OPTIX_PATH}"

      - name: Build
        shell: bash
        run: |
          set -euxo pipefail
          cmake --build "${SPECTRA_BUILD_DIR}" --parallel 30

      - name: Test
        shell: bash
        run: |
          set -euxo pipefail
          if [ -f "${SPECTRA_BUILD_DIR}/CTestTestfile.cmake" ] || [ -d "${SPECTRA_BUILD_DIR}/Testing" ]; then
            ctest --test-dir "${SPECTRA_BUILD_DIR}" --output-on-failure
          else
            echo "No tests detected; skipping."
          fi
